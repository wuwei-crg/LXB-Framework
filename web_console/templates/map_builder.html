<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LXB Map Builder v5</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: #111827;
            padding: 15px 30px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header { display: none; }
        .header h1 {
            font-size: 20px;
            color: #93c5fd;
        }

        /* 两栏布局 (v5 优化) */
        .main-layout {
            display: grid;
            grid-template-columns: 420px 430px 1fr;
            gap: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧面板 - 配置+日志 */
        .left-panel {
            background: #0f172a;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .log-panel {
            background: #0f172a;
            border-right: 1px solid #334155;
            padding: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 右侧主面板 - 截图+节点 */
        .main-panel {
            background: #0b1220;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 卡片 */
        .card {
            background: #111827;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #334155;
        }
        .card h3 {
            font-size: 13px;
            color: #93c5fd;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card h3 > span:not(:first-child) {
            margin-left: auto;
        }
        .card h3::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, #3b82f6, #1d4ed8);
            border-radius: 2px;
        }

        /* 表单 */
        .form-group { margin-bottom: 10px; }
        .form-group label {
            display: block;
            margin-bottom: 3px;
            color: #94a3b8;
            font-size: 11px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0b1220;
            color: #e2e8f0;
            font-size: 12px;
            transition: all 0.2s;
        }
        .form-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-group select option {
            background: #0b1220;
            color: #e2e8f0;
            padding: 8px;
        }

        /* 按钮 */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #2563eb;
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
        }
        .btn-primary:disabled {
            background: #334155;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }
        .btn-secondary:hover {
            background: #475569;
            color: #fff;
        }
        .btn-success {
            background: #059669;
            color: #fff;
        }

        /* 状态指示器 */
        .status {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 12px;
        }
        .status.success {
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid #00d4aa;
            color: #00d4aa;
        }
        .status.error {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid #e94560;
            color: #e94560;
        }
        .status.warning {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid #ffc107;
            color: #ffc107;
        }

        /* 截图容器 */
        .screenshot-container {
            position: relative;
            display: inline-block;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .screenshot-container img {
            display: block;
            max-width: 100%;
            max-height: 70vh;
        }
        .screenshot-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* 页面描述 */
        .page-description {
            background: linear-gradient(135deg, #1e1e38, #2a2a4a);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #00d4ff;
        }
        .page-description h4 {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .page-description p {
            font-size: 14px;
            line-height: 1.6;
            color: #ddd;
        }

        /* UI 元素列表 */
        .ui-elements {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .ui-element {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ui-element:hover {
            border-color: #00d4ff;
            background: #252542;
        }
        .ui-element.highlight {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        .ui-element-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .ui-element-type {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #3a3a5a;
            color: #aaa;
        }
        .ui-element-type.button { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
        .ui-element-type.text { background: rgba(123, 104, 238, 0.2); color: #7b68ee; }
        .ui-element-type.icon { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .ui-element-type.input { background: rgba(0, 212, 170, 0.2); color: #00d4aa; }
        .ui-element-text {
            font-size: 13px;
            color: #fff;
            margin-bottom: 4px;
        }
        .ui-element-ocr {
            font-size: 11px;
            color: #888;
            font-style: italic;
        }
        .ui-element-bbox {
            font-size: 10px;
            color: #666;
            font-family: monospace;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .stat-item {
            background: #1a1a2e;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7b68ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        /* 页面列表 */
        .page-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
        }
        .page-item {
            background: #1a1a2e;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .page-item:hover {
            border-color: #00d4ff;
        }
        .page-item.active {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
        }
        .page-item-name {
            font-size: 13px;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .page-item-desc {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 日志 */
        .logs {
            background: #0a0a14;
            border-radius: 8px;
            padding: 12px;
            height: 100%;
            min-height: 360px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
        }
        .log-entry {
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .log-time { color: #666; margin-right: 8px; }
        .log-info { color: #00d4ff; }
        .log-debug { color: #aaa; }
        .log-warn { color: #ffc107; }
        .log-error { color: #e94560; }
        .log-filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
            margin: 8px 0 10px;
            padding: 8px;
            background: #151529;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            font-size: 11px;
        }
        .log-filter-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #bbb;
            user-select: none;
            cursor: pointer;
        }
        .log-filter-item input {
            accent-color: #00d4ff;
        }

        /* 进度条 */
        .progress {
            height: 4px;
            background: #2a2a4a;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b68ee);
            transition: width 0.3s;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a6a; }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #3a3a5a;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }
        .screenshot-panel {
            flex: 1 1 auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .node-list-panel {
            width: 300px;
            min-width: 300px;
            margin-left: auto;
            background: #16162a;
            border-left: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
        }

        /* 标签 */
        .section-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            background: #0b1220;
            padding: 4px;
            border-radius: 8px;
        }
        .section-tab {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: #94a3b8;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .section-tab.active {
            background: #1e293b;
            color: #e2e8f0;
        }
        .section-tab:hover:not(.active) {
            background: #172554;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>LXB Map Builder</h1>
        <div style="display: flex; gap: 12px; align-items: center;">
            <select id="explore-version" style="padding: 6px 12px; background: #0b1220; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 12px;">
                <option value="node" selected>v5 Node驱动 (推荐)</option>
                <option value="coord">v4 坐标驱动</option>
                <option value="som">v3 SoM 标注</option>
                <option value="v3">v3 语义探索</option>
                <option value="v2">v2 VLM+XML</option>
            </select>
            <span id="connection-status" class="status" style="margin: 0; padding: 6px 12px;">
                <span class="loading"></span> 连接中...
            </span>
        </div>
    </div>

    <div class="main-layout">
        <!-- 左侧面板 - 配置+日志 -->
        <div class="left-panel">
            <!-- 统一配置面板 -->
            <div class="card">
                <h3>⚙️ 配置</h3>

                <!-- 应用选择 -->
                <div class="form-group">
                    <label>选择应用</label>
                    <div style="display: flex; gap: 6px;">
                        <select id="app-select" style="flex: 1;" onchange="onAppSelect()">
                            <option value="">-- 刷新获取列表 --</option>
                        </select>
                        <button class="btn btn-secondary" onclick="refreshAppList()" title="刷新" style="padding: 6px 10px;">🔄</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>包名</label>
                    <input type="text" id="package-name" placeholder="com.example.app">
                </div>

                <!-- 探索参数 -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div class="form-group" style="margin: 0;">
                        <label>最大页面</label>
                        <input type="number" id="max-pages" value="30" min="1" max="100">
                    </div>
                    <div class="form-group" style="margin: 0;">
                        <label>最大深度</label>
                        <input type="number" id="max-depth" value="5" min="1" max="20">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px;">
                    <div class="form-group" style="margin: 0;">
                        <label>探索模式</label>
                        <select id="explore-mode">
                            <option value="serial">串行 (稳定)</option>
                            <option value="parallel">并行 (快速)</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin: 0;">
                        <label>点击延迟(秒)</label>
                        <input type="number" id="click-delay" value="1.5" min="0.5" max="5" step="0.5">
                    </div>
                </div>

                <!-- VLM 配置 (可折叠) -->
                <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #2a2a4a;">
                    <div onclick="toggleVLMConfig()" style="cursor: pointer; display: flex; align-items: center; margin-bottom: 8px;">
                        <span style="font-size: 11px; color: #888;">VLM 配置</span>
                        <span id="vlm-toggle" style="margin-left: 6px; font-size: 10px; color: #666;">▼</span>
                        <span id="config-badge" style="margin-left: auto; font-size: 9px; background: #3a3a5a; padding: 2px 5px; border-radius: 3px; display: none;">已保存</span>
                    </div>
                    <div id="vlm-config-content">
                        <div class="form-group">
                            <label>API URL</label>
                            <input type="text" id="vlm-api-url" placeholder="https://api.example.com/v1">
                        </div>
                        <div class="form-group">
                            <label>API Key</label>
                            <input type="password" id="vlm-api-key" placeholder="sk-xxx">
                        </div>
                        <div class="form-group">
                            <label>模型</label>
                            <input type="text" id="vlm-model-name" value="qwen-vl-plus">
                        </div>
                        <div style="display: flex; align-items: center; margin: 8px 0;">
                            <input type="checkbox" id="vlm-concurrent-enabled" style="margin-right: 6px;">
                            <label for="vlm-concurrent-enabled" style="margin: 0; cursor: pointer; font-size: 11px;">并发推理</label>
                        </div>
                        <div id="concurrent-config" style="display: none;">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
                                <div class="form-group" style="margin: 0;">
                                    <label>并发数</label>
                                    <input type="number" id="vlm-concurrent-requests" value="5" min="1" max="10">
                                </div>
                                <div class="form-group" style="margin: 0;">
                                    <label>阈值</label>
                                    <input type="number" id="vlm-occurrence-threshold" value="2" min="1" max="10">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div style="display: flex; gap: 6px; margin-top: 12px;">
                    <button class="btn btn-secondary" style="padding: 6px 10px;" onclick="testVLMApi()" title="测试 VLM API">🧪</button>
                    <button class="btn btn-secondary" style="padding: 6px 10px;" onclick="saveAllConfig()" title="保存配置">💾</button>
                    <button class="btn btn-success" id="btn-start" style="flex: 1;" onclick="startExploration()">▶ 开始探索</button>
                    <button class="btn btn-secondary hidden" id="btn-pause" onclick="pauseExploration()">⏸</button>
                    <button class="btn btn-secondary hidden" id="btn-resume" onclick="resumeExploration()">▶</button>
                    <button class="btn btn-secondary hidden" id="btn-stop" style="background: #e94560; color: #fff;" onclick="stopExploration()">⏹</button>
                </div>
            </div>

            <!-- 探索日志 -->
            
        </div>

        <div class="log-panel">
<div class="card" style="flex: 1; display: flex; flex-direction: column; min-height: 150px;">
                <h3>📝 日志</h3>
                <div class="progress">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                <div class="log-filter-bar">
                    <label class="log-filter-item"><input type="checkbox" id="f-find" checked>find_node</label>
                    <label class="log-filter-item"><input type="checkbox" id="f-tap" checked>tap</label>
                    <label class="log-filter-item"><input type="checkbox" id="f-warn" checked>warn</label>
                    <label class="log-filter-item"><input type="checkbox" id="f-error" checked>error</label>
                    <label class="log-filter-item"><input type="checkbox" id="f-popup">popup</label>
                    <label class="log-filter-item"><input type="checkbox" id="f-route">route</label>
                    <label class="log-filter-item"><input type="checkbox" id="f-vlm">vlm</label>
                    <label class="log-filter-item"><input type="checkbox" id="f-other">other</label>
                </div>
                <div class="logs" id="logs" style="flex: 1;"></div>
            </div>
        </div>

        <!-- 右侧主面板 -->
        <div class="main-panel">
            <!-- 顶部状态栏 -->
            <div style="padding: 12px 16px; background: #16162a; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 12px;">
                <span id="explore-status-badge" style="padding: 4px 10px; background: #2a2a4a; border-radius: 4px; font-size: 11px;">⏳ 空闲</span>
                <span id="explore-stats-inline" style="font-size: 11px; color: #888;">节点: 0 | 动作: 0</span>
                <span style="flex: 1;"></span>
                <span id="connection-status-mini" style="font-size: 10px; color: #666;">-</span>
            </div>

            <!-- 主内容区：截图 + 节点列表 -->
            <div style="flex: 1; display: flex; overflow: hidden;">
                <!-- 左侧：实时截图 -->
                <div class="screenshot-panel">
                    <div id="screenshot-container" style="flex: 1; display: flex; align-items: center; justify-content: center; background: #0f0f1a; border-radius: 10px; overflow: hidden;">
                        <div class="empty-state">
                            <div class="empty-state-icon">📱</div>
                            <p>等待探索开始...</p>
                        </div>
                    </div>
                    <div id="current-action-info" style="margin-top: 8px; font-size: 11px; color: #666; text-align: center;">-</div>
                </div>

                <!-- 右侧：节点列表 -->
                <div class="node-list-panel">
                    <div style="padding: 12px 14px; border-bottom: 1px solid #2a2a4a;">
                        <div style="font-size: 12px; font-weight: 500; color: #00d4ff;">🎯 节点列表</div>
                    </div>
                    <div id="node-list-container" style="flex: 1; overflow-y: auto; padding: 10px;">
                        <div class="empty-state" style="padding: 30px 15px;">
                            <div class="empty-state-icon" style="font-size: 36px;">📋</div>
                            <p style="font-size: 11px;">开始探索后显示节点</p>
                        </div>
                    </div>
                    <div style="padding: 10px; border-top: 1px solid #2a2a4a;">
                        <button class="btn btn-secondary" style="width: 100%; padding: 8px;" onclick="saveResult()">💾 保存结果</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let logIndex = 0;
        let pollInterval = null;
        let realtimeInterval = null;
        let allLogs = [];
        const LOG_MAX = 2000;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadAllConfig();
            checkConnection();
            setInterval(checkConnection, 5000);
            document.getElementById('vlm-concurrent-enabled').addEventListener('change', updateConcurrentConfigVisibility);
            setupLogFilters();
        });

        // VLM 配置折叠
        function toggleVLMConfig() {
            const content = document.getElementById('vlm-config-content');
            const toggle = document.getElementById('vlm-toggle');
            if (content.style.display === 'none') {
                content.style.display = 'block';
                toggle.textContent = '▼';
            } else {
                content.style.display = 'none';
                toggle.textContent = '▶';
            }
        }

        // 检查连接状态
        async function checkConnection() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                const statusEl = document.getElementById('connection-status');
                const miniEl = document.getElementById('connection-status-mini');

                if (data.connected) {

        // 绘制检测框 - 接收像素坐标
        function drawBBoxes(nodes, imageWidth, imageHeight) {
            const canvas = document.getElementById('screenshot-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const img = document.getElementById('screenshot-img');

            // 计算缩放比例（图片可能被缩放显示）
            const scaleX = img.width / imageWidth;
            const scaleY = img.height / imageHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 颜色映射
            const colors = {
                button: '#00d4ff',
                icon: '#ffc107',
                text: '#7b68ee',
                input: '#00d4aa',
                image: '#ff6b6b',
                default: '#00d4ff'
            };

            nodes.forEach((node, idx) => {
                const [x1, y1, x2, y2] = node.bounds;
                const color = colors[node.vlm_label?.toLowerCase()] || colors.default;

                // 绘制边框
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    x1 * scaleX,
                    y1 * scaleY,
                    (x2 - x1) * scaleX,
                    (y2 - y1) * scaleY
                );

                // 绘制序号标签
                const labelWidth = 24;
                const labelHeight = 18;
                ctx.fillStyle = color;
                ctx.fillRect(x1 * scaleX, y1 * scaleY - labelHeight, labelWidth, labelHeight);
                ctx.fillStyle = '#000';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(idx + 1, x1 * scaleX + labelWidth / 2, y1 * scaleY - 5);
            });
        }

        // 截图并分析
        async function captureAndAnalyze() {

                const data2 = await res2.json();

                if (data2.success) {
                    currentAnalysis = data2.response;
                    const resp = data2.response;

                    // 显示并发信息
                    if (resp.concurrent_enabled) {
                        addLog('info', `🚀 并发: ${resp.concurrent_requests}次 → ${resp.concurrent_results}成功 → ${resp.aggregated_count}个检测`);
                        addLog('info', `📊 融合: ${resp.fusion_stats.xml_nodes}个XML + ${resp.fusion_stats.vlm_detections}个VLM → ${resp.fusion_stats.matched}个匹配`);
                        if (resp.aggregated_count === 0) {
                            addLog('warn', '⚠️ 没有有效的 VLM 检测，可能阈值太高，建议降低阈值或关闭并发模式');
                        }
                    } else {
                        addLog('info', `📊 融合: ${resp.fusion_stats.xml_nodes}个XML + ${resp.fusion_stats.vlm_detections}个VLM → ${resp.fusion_stats.matched}个匹配`);
                    }

                    // 显示页面描述
                    document.getElementById('page-caption').textContent =
                        resp.page_description || '暂无描述';
                    document.getElementById('analysis-result').classList.remove('hidden');

                    // 显示统计
                    const stats = resp.fusion_stats || {};
                    document.getElementById('stat-vlm').textContent = stats.vlm_detections || 0;
                    document.getElementById('stat-unmatched').textContent = stats.unmatched_vlm || 0;

                    // 打印调试信息到控制台
                    console.log('=== VLM 原始检测 (前20个) ===');
                    console.log('图片尺寸:', resp.image_size);
                    (resp.vlm_raw || []).forEach((det, i) => {
                        console.log(`${i}: [${det.bbox.join(', ')}] ${det.label} - ${det.text}`);
                    });
                    console.log('=== XML 节点样本 (前5个) ===');
                    (resp.xml_sample || []).forEach((node, i) => {
                        console.log(`${i}: [${node.bounds.join(', ')}] ${node.class} - ${node.text}`);
                    });

                    // 如果有匹配结果，显示融合节点
                    const nodes = resp.nodes || [];
                    if (nodes.length > 0) {
                        displayUIElements(nodes);
                        // 绘制融合节点的检测框
                        if (resp.image_size) {
                            const [imgWidth, imgHeight] = resp.image_size;
                            const img = document.getElementById('screenshot-img');
                            const draw = () => drawBBoxes(nodes, imgWidth, imgHeight);
                            img.complete ? draw() : (img.onload = draw);
                        }
                    } else {
                        // 没有匹配，直接显示 VLM 原始检测
                        addLog('warn', '没有匹配到 XML 节点，显示 VLM 原始检测');
                        displayVLMRaw(resp.vlm_raw || []);
                        // 绘制 VLM 原始检测框
                        if (resp.image_size && resp.vlm_raw) {
                            const [imgWidth, imgHeight] = resp.image_size;
                            const img = document.getElementById('screenshot-img');
                            const draw = () => drawVLMBBoxes(resp.vlm_raw, imgWidth, imgHeight);
                            img.complete ? draw() : (img.onload = draw);

                    addLog('info', `${data2.message} (${resp.vlm_time_ms}ms)`);
                } else {
                    addLog('error', data2.message);
                    if (data2.traceback) {
                        console.error(data2.traceback);
                    }
                }
            } catch (e) {
                addLog('error', `分析失败: ${e.message}`);

        // 绘制 VLM 原始检测框（像素坐标）
        function drawVLMBBoxes(vlmRaw, imageWidth, imageHeight) {
            const canvas = document.getElementById('screenshot-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const img = document.getElementById('screenshot-img');
            const scaleX = img.width / imageWidth;
            const scaleY = img.height / imageHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            vlmRaw.forEach((det, idx) => {
                const [x1, y1, x2, y2] = det.bbox;

                // 绘制边框 - 红色表示未匹配
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 2;
                ctx.strokeRect(
                    x1 * scaleX,
                    y1 * scaleY,
                    (x2 - x1) * scaleX,
                    (y2 - y1) * scaleY
                );

                // 绘制序号
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(x1 * scaleX, y1 * scaleY - 16, 20, 16);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(idx + 1, x1 * scaleX + 10, y1 * scaleY - 4);
            });

            addLog('info', `绘制了 ${vlmRaw.length} 个 VLM 检测框`);
        }

                        <div class="empty-state-icon">🔍</div>
                        <p>未检测到重要 UI 元素</p>

            }

            container.innerHTML = nodes.map((node, idx) => `
                <div class="ui-element" onclick="highlightElement(${idx})" data-index="${idx}">
                    <div class="ui-element-header">
                        <span class="ui-element-type ${getElementClass(node)}">${node.vlm_label || 'element'}</span>
                        <span style="font-size: 10px; color: #666;">IoU: ${(node.iou_score || 0).toFixed(2)}</span>
                    </div>
                    <div class="ui-element-text">${getElementText(node)}</div>
                    ${node.resource_id ? `<div class="ui-element-ocr">ID: ${node.resource_id}</div>` : ''}
                    ${node.vlm_ocr_text ? `<div class="ui-element-ocr">OCR: ${node.vlm_ocr_text}</div>` : ''}
                </div>
            `).join('');
        }

        // 获取元素类型
        function getElementType(node) {
            if (node.editable) return 'input';
            if (node.vlm_label) {
                const label = node.vlm_label.toLowerCase();
                if (label.includes('button')) return 'button';
                if (label.includes('icon')) return 'icon';
                if (label.includes('text')) return 'text';
            }
            if (node.clickable) return 'button';
            if (node.text) return 'text';
            return 'element';
        }

        // 获取元素CSS类
        function getElementClass(node) {
            const type = getElementType(node);
            return ['button', 'text', 'icon', 'input'].includes(type) ? type : '';
        }

        // 获取元素文本
        function getElementText(node) {
            if (node.text) return node.text;
            if (node.resource_id) return node.resource_id;
            if (node.vlm_label) return node.vlm_label;
            if (node.content_desc) return node.content_desc;
            return node.class_name.split('.').pop();
        }

        // 高亮元素
        function highlightElement(idx) {
            document.querySelectorAll('.ui-element').forEach(el => {
                el.classList.remove('highlight');
            });
            document.querySelector(`.ui-element[data-index="${idx}"]`)?.classList.add('highlight');
        }

        // 开始探索
        async function startExploration() {
            const packageName = document.getElementById('package-name').value.trim();
            if (!packageName) {
                alert('请输入应用包名');
                return;
            }

            const version = document.getElementById('explore-version').value;
            const exploreMode = document.getElementById('explore-mode').value;
            const clickDelay = parseFloat(document.getElementById('click-delay').value) || 1.5;
            const config = {
                package: packageName,
                max_pages: parseInt(document.getElementById('max-pages').value),
                max_depth: parseInt(document.getElementById('max-depth').value),
                // 探索模式配置
                explore_mode: exploreMode,
                click_delay: clickDelay,
                // VLM 并发配置 (v2)
                vlm_concurrent_enabled: document.getElementById('vlm-concurrent-enabled').checked,
                vlm_concurrent_requests: parseInt(document.getElementById('vlm-concurrent-requests').value) || 5,
                vlm_occurrence_threshold: parseInt(document.getElementById('vlm-occurrence-threshold').value) || 2
            };

            // 更新按钮状态
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-pause').classList.remove('hidden');
            document.getElementById('btn-resume').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');
            document.getElementById('logs').innerHTML = '';
            logIndex = 0;

            addLog('info', `[${version}] 开始探索: ${packageName}`);

            // 显示版本特性
            if (version === 'node') {
                const modeStr = exploreMode === 'parallel' ? '并行' : '串行';
                addLog('info', `🎯 Node驱动 (${modeStr}模式): 以节点为单位探索，每次从首页开始`);
                if (exploreMode === 'parallel') {
                    addLog('info', `⚡ 并行模式: VLM 后台推理，点击延迟 ${clickDelay}s`);
                }
            } else if (version === 'coord') {
                addLog('info', `📍 坐标驱动: VLM 输出坐标 → 映射 XML → 点击`);
            } else if (version === 'som') {
                addLog('info', `📸 SoM 模式: 截图标注 + VLM 选择编号`);
            } else if (version === 'v3') {
                addLog('info', `🧠 语义 ID 去重 + 精确路径记录`);
            } else {
                if (config.vlm_concurrent_enabled) {
                    addLog('info', `🚀 VLM 并发模式: ${config.vlm_concurrent_requests} 次并发`);
                }
            }

            // 切换到探索模式
            startRealtimePolling();

            pollInterval = setInterval(pollLogs, 1000);

            // 根据版本选择 API
            let apiUrl;
            if (version === 'node') {
                apiUrl = `${API_BASE}/api/explore/node/start`;
            } else if (version === 'coord') {
                apiUrl = `${API_BASE}/api/explore/coord/start`;
            } else if (version === 'som') {
                apiUrl = `${API_BASE}/api/explore/som/start`;
            } else if (version === 'v3') {
                apiUrl = `${API_BASE}/api/explore/v3/start`;
            } else {
                apiUrl = `${API_BASE}/api/explore/start`;
            }

            try {
                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await res.json();

                clearInterval(pollInterval);
                stopRealtimePolling();

                if (data.success) {
                    addLog('info', data.message);
                } else {
                    addLog('error', data.message);
                }
            } catch (e) {
                clearInterval(pollInterval);
                stopRealtimePolling();
                addLog('error', `探索失败: ${e.message}`);
            }

            // 恢复按钮状态
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-pause').classList.add('hidden');
            document.getElementById('btn-resume').classList.add('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
        }

        // 暂停探索
        async function pauseExploration() {
            try {
                const res = await fetch(`${API_BASE}/api/explore/pause`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    addLog('warn', `⏸️ ${data.message}`);
                    document.getElementById('btn-pause').classList.add('hidden');
                    document.getElementById('btn-resume').classList.remove('hidden');
                } else {
                    addLog('error', data.message);
                }
            } catch (e) {
                addLog('error', `暂停失败: ${e.message}`);
            }
        }

        // 恢复探索
        async function resumeExploration() {
            try {
                const res = await fetch(`${API_BASE}/api/explore/resume`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    addLog('info', `▶️ ${data.message}`);
                    document.getElementById('btn-pause').classList.remove('hidden');
                    document.getElementById('btn-resume').classList.add('hidden');
                } else {
                    addLog('error', data.message);
                }
            } catch (e) {
                addLog('error', `恢复失败: ${e.message}`);
            }
        }

        // 停止探索
        async function stopExploration() {
            if (!confirm('确定要停止探索吗？当前进度将被保存。')) {
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/explore/stop`, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    addLog('warn', `⏹️ ${data.message}`);
                } else {
                    addLog('error', data.message);
                }
            } catch (e) {
                addLog('error', `停止失败: ${e.message}`);
            }
        }

        // 轮询日志
        async function pollLogs() {
            try {
                const res = await fetch(`${API_BASE}/api/explore/logs?since=${logIndex}`);
                const data = await res.json();

                if (data.success && data.logs.length > 0) {
                    data.logs.forEach(log => {
                        addLog(log.level, log.message, log.time);
                    });
                    logIndex = data.total;
                }

                const statusRes = await fetch(`${API_BASE}/api/explore/status`);
                const status = await statusRes.json();

                if (status.progress) {
                    const pages = status.progress.pages_discovered || 0;
                    const maxPages = parseInt(document.getElementById('max-pages').value);
                    const percent = Math.min(100, (pages / maxPages) * 100);
                    document.getElementById('progress-fill').style.width = `${percent}%`;
                }
            } catch (e) {
                console.error('Poll error:', e);
            }
        }

        // 保存结果
        async function saveResult() {
            const version = document.getElementById('explore-version').value;
            let apiUrl;
            if (version === 'node') {
                apiUrl = `${API_BASE}/api/explore/node/save`;
            } else if (version === 'v3') {
                apiUrl = `${API_BASE}/api/explore/v3/save`;
            } else {
                apiUrl = `${API_BASE}/api/explore/save`;
            }

            try {
                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await res.json();
                if (data.success) {
                    addLog('info', data.message);
                    alert(`已保存: ${data.filepath || data.path || '成功'}`);
                } else {
                    addLog('error', data.message);
                }
            } catch (e) {
                addLog('error', `保存失败: ${e.message}`);
            }
        }

        // 添加日志
        function setupLogFilters() {
            ['f-find', 'f-tap', 'f-warn', 'f-error', 'f-popup', 'f-route', 'f-vlm', 'f-other'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('change', renderLogs);
                }
            });
        }

        function classifyLog(level, message) {
            const m = String(message || '').toLowerCase();
            if (m.includes('[find_node]') || m.includes('find_node') || m.includes('query=')) return 'find';
            if (m.includes('[tap]') || m.includes('tap(') || m.includes('click')) return 'tap';
            if (m.includes('popup') || m.includes('block')) return 'popup';
            if (m.includes('path') || m.includes('queue') || m.includes('replay')) return 'route';
            if (m.includes('vlm') || m.includes('concurrent') || m.includes('infer')) return 'vlm';
            return 'other';
        }

        function shouldShowLog(entry) {
            const level = (entry.level || '').toLowerCase();
            if (level === 'warn' && !document.getElementById('f-warn')?.checked) return false;
            if (level === 'error' && !document.getElementById('f-error')?.checked) return false;
            if (level === 'warn' || level === 'error') return true;

            const cat = entry.category || 'other';
            if (cat === 'find' && !document.getElementById('f-find')?.checked) return false;
            if (cat === 'tap' && !document.getElementById('f-tap')?.checked) return false;
            if (cat === 'popup' && !document.getElementById('f-popup')?.checked) return false;
            if (cat === 'route' && !document.getElementById('f-route')?.checked) return false;
            if (cat === 'vlm' && !document.getElementById('f-vlm')?.checked) return false;
            if (cat === 'other' && !document.getElementById('f-other')?.checked) return false;

            return true;
        }

        function renderLogs() {
            const logsEl = document.getElementById('logs');
            const visible = allLogs.filter(shouldShowLog).slice(-800);
            logsEl.innerHTML = '';
            visible.forEach(log => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `<span class="log-time">${log.time}</span><span class="log-${log.level}">${log.message}</span>`;
                logsEl.appendChild(entry);
            });
            logsEl.scrollTop = logsEl.scrollHeight;
        }

        function addLog(level, message, sourceTime = null) {
            const entry = {
                level: (level || 'info').toLowerCase(),
                message: String(message || ''),
                time: sourceTime || new Date().toLocaleTimeString(),
                category: classifyLog(level, message)
            };
            allLogs.push(entry);
            if (allLogs.length > LOG_MAX) {
                allLogs = allLogs.slice(-LOG_MAX);
            }
            renderLogs();
        }

        // ========== 实时监控功能 ==========

        // 更新实时监控 UI (简化版)
        function updateRealtimeUI(state) {
            const statusMap = {
                'idle': '⏳ 空闲',
                'running': '🟢 运行中',
                'paused': '🟡 已暂停',
                'stopping': '🔴 停止中',
                'stopped': '⚫ 已停止',
                'completed': '✅ 完成'
            };

            const stats = state.stats || {};

            // 更新状态栏
            const statusBadge = document.getElementById('explore-status-badge');
            const modeStr = state.mode === 'parallel' ? '⚡' : '';
            statusBadge.textContent = modeStr + (statusMap[state.status] || state.status);

            // 更新统计
            const explored = stats.explored_nodes || stats.pages || 0;
            const total = stats.total_nodes || '-';
            const actions = stats.total_actions || stats.actions || 0;
            const queue = stats.queue_size || 0;
            const pendingVlm = stats.pending_vlm || 0;
            let statsText = `节点: ${explored}/${total} | 动作: ${actions} | 队列: ${queue}`;
            if (pendingVlm > 0) {
                statsText += ` | VLM: ${pendingVlm}`;
            }
            document.getElementById('explore-stats-inline').textContent = statsText;

            // 更新截图
            if (state.current_screenshot) {
                document.getElementById('screenshot-container').innerHTML = `
                    <img src="data:image/jpeg;base64,${state.current_screenshot}"
                         style="max-width: 88%; max-height: 88%; object-fit: contain; cursor: pointer;"
                         onclick="showFullScreenshot(this.src)">
                `;
            }

            // 更新当前动作
            const actionInfo = state.last_action || '-';
            document.getElementById('current-action-info').textContent = actionInfo;

            // 更新节点列表
            if (state.node_list && state.node_list.length > 0) {
                renderNodeListV5(state.node_list, 'node-list-container');
            }
        }

        // 渲染 v5 节点列表
        function renderNodeListV5(nodeList, containerId = 'node-list-container') {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (!nodeList || nodeList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding: 30px 15px;">
                        <div class="empty-state-icon" style="font-size: 36px;">📋</div>
                        <p style="font-size: 11px;">暂无节点</p>
                    </div>
                `;
                return;
            }

            const explored = nodeList.filter(n => n.explored);
            const pending = nodeList.filter(n => !n.explored);

            let html = '';

            // 统计信息
            html += `
                <div style="display: flex; gap: 6px; margin-bottom: 10px;">
                    <div style="flex: 1; padding: 6px; background: rgba(0, 212, 170, 0.1); border-radius: 5px; text-align: center;">
                        <div style="font-size: 16px; font-weight: bold; color: #00d4aa;">${explored.length}</div>
                        <div style="font-size: 9px; color: #888;">已探索</div>
                    </div>
                    <div style="flex: 1; padding: 6px; background: rgba(255, 193, 7, 0.1); border-radius: 5px; text-align: center;">
                        <div style="font-size: 16px; font-weight: bold; color: #ffc107;">${pending.length}</div>
                        <div style="font-size: 9px; color: #888;">待探索</div>
                    </div>
                </div>
            `;

            // 待探索节点
            if (pending.length > 0) {
                html += `<div style="color: #ffc107; font-size: 10px; margin-bottom: 4px; font-weight: 500;">⏳ 待探索</div>`;
                pending.slice(0, 8).forEach((node, idx) => {
                    html += renderNodeItemV5(node, idx, false);
                });
                if (pending.length > 8) {
                    html += `<div style="text-align: center; color: #666; font-size: 9px; padding: 3px;">+${pending.length - 8} 更多</div>`;
                }
            }

            // 已探索节点
            if (explored.length > 0) {
                html += `<div style="color: #00d4aa; font-size: 10px; margin: 8px 0 4px 0; font-weight: 500;">✓ 已探索</div>`;
                explored.slice(0, 10).forEach((node, idx) => {
                    html += renderNodeItemV5(node, idx, true);
                });
                if (explored.length > 10) {
                    html += `<div style="text-align: center; color: #666; font-size: 9px; padding: 3px;">+${explored.length - 10} 更多</div>`;
                }
            }

            container.innerHTML = html;
        }

        // 渲染单个 v5 节点项
        function renderNodeItemV5(node, idx, explored) {
            const borderColor = explored ? '#00d4aa' : '#ffc107';
            const bgColor = explored ? 'rgba(0, 212, 170, 0.03)' : 'rgba(255, 193, 7, 0.03)';
            const statusIcon = explored ? '✓' : '○';

            const roleIcons = {
                'bottom_tab': '📱',
                'top_tab': '📑',
                'back': '⬅️',
                'jump': '🔗',
                'input': '✏️',
                'search': '🔍',
                'menu': '☰',
                'other': '•'
            };
            const roleIcon = roleIcons[node.role] || '•';

            return `
                <div style="padding: 6px 8px; margin-bottom: 4px; background: ${bgColor}; border-radius: 5px;
                            border-left: 2px solid ${borderColor};">
                    <div style="display: flex; align-items: center; gap: 4px;">
                        <span style="font-size: 9px; color: ${borderColor};">${statusIcon}</span>
                        <span style="font-size: 11px;">${roleIcon}</span>
                        <span style="color: #ddd; font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                            ${node.description || node.node_key || '?'}
                        </span>
                    </div>
                    ${node.target_description ? `
                        <div style="font-size: 9px; color: #7b68ee; margin-left: 24px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                            → ${node.target_description}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // 显示全屏截图
        function showFullScreenshot(src) {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.9); z-index: 9999;
                display: flex; align-items: center; justify-content: center;
                cursor: pointer;
            `;
            overlay.onclick = () => overlay.remove();

            const img = document.createElement('img');
            img.src = src;
            img.style.cssText = 'max-width: 90%; max-height: 90%; border-radius: 8px;';

            overlay.appendChild(img);
            document.body.appendChild(overlay);
        }

        // 开始实时监控轮询
        function startRealtimePolling() {
            if (realtimeInterval) return;
            realtimeInterval = setInterval(refreshRealtime, 2000);
        }

        // 停止实时监控轮询
        function stopRealtimePolling() {
            if (realtimeInterval) {
                clearInterval(realtimeInterval);
                realtimeInterval = null;
            }
        }

        // 刷新实时状态
        async function refreshRealtime() {
            try {
                const res = await fetch(`${API_BASE}/api/explore/realtime`);
                const data = await res.json();
                if (data.success) {
                    updateRealtimeUI(data.data);
                }
            } catch (e) {
                console.error('Realtime fetch error:', e);
            }
        }
    </script>
</body>
</html>
