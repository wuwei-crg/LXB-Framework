<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LXB Command Studio</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; font-family: "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
        .page { display: flex; flex-direction: column; height: 100%; }
        .header {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: #111827;
            border-bottom: 1px solid #334155;
        }
        .header { display: none; }
        .title { display: flex; flex-direction: column; }
        .title h1 { margin: 0; font-size: 18px; color: #93c5fd; }
        .title p { margin: 2px 0 0; font-size: 12px; color: #94a3b8; }

        .main { flex: 1; min-height: 0; display: grid; grid-template-columns: 430px 1fr; gap: 12px; padding: 12px; }
        .panel { background: #111827; border: 1px solid #334155; border-radius: 10px; min-height: 0; }
        .left { display: flex; flex-direction: column; overflow: hidden; }
        .left-scroll { overflow: auto; padding: 12px; }
        .right { display: flex; flex-direction: column; overflow: hidden; }

        .card { background: #0b1220; border: 1px solid #334155; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
        .connection-card { display: none; }
        .card h3 { margin: 0 0 8px; font-size: 13px; color: #93c5fd; }
        .card h4 { margin: 0 0 8px; font-size: 12px; color: #cbd5e1; }

        .row { display: flex; gap: 8px; align-items: center; }
        .row + .row { margin-top: 8px; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        input, select {
            width: 100%;
            background: #020617;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 7px 8px;
            font-size: 12px;
        }
        input:focus, select:focus { outline: none; border-color: #3b82f6; }
        .mono { font-family: Consolas, monospace; }

        .btn {
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            padding: 7px 10px;
            white-space: nowrap;
        }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .btn-cmd { background: #1e293b; color: #e2e8f0; border-color: #334155; }
        .btn-cmd:hover { background: #273449; }
        .btn-danger { background: #7f1d1d; color: #fecaca; border-color: #991b1b; }
        .btn-highlight { border-color: #1d4ed8; }
        .btn-small { padding: 6px 8px; font-size: 11px; }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }

        .status-pill {
            padding: 6px 10px;
            border-radius: 8px;
            background: #1e293b;
            border: 1px solid #334155;
            font-size: 12px;
            color: #cbd5e1;
        }
        .status-connected { background: #064e3b; border-color: #047857; color: #a7f3d0; }
        .status-disconnected { background: #3f1d2e; border-color: #7f1d1d; color: #fecaca; }
        .status-connecting { background: #1e3a8a; border-color: #1d4ed8; color: #bfdbfe; }

        .log-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #334155; }
        .log-header h2 { margin: 0; font-size: 14px; color: #93c5fd; }
        .log-container { flex: 1; min-height: 0; overflow: auto; padding: 10px 12px; background: #020617; }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #1e293b; font-size: 12px; }
        .log-time { color: #94a3b8; margin-right: 8px; }
        .log-info { color: #93c5fd; }
        .log-success { color: #86efac; }
        .log-error { color: #fca5a5; }

        .screenshot-preview { border-top: 1px solid #334155; padding: 10px; background: #0b1220; }
        .screenshot-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .screenshot-header h3 { margin: 0; font-size: 12px; color: #93c5fd; }
        #screenshot-image { width: 100%; max-height: 300px; object-fit: contain; border: 1px solid #334155; border-radius: 8px; background: #000; }

        .footer {
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            border-top: 1px solid #334155;
            background: #111827;
            font-size: 11px;
            color: #94a3b8;
        }
        .stats { display: flex; gap: 14px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.8); display: none; align-items: center; justify-content: center; z-index: 50; }
        .modal-container {
            width: min(1100px, 96vw);
            height: min(760px, 92vh);
            background: #0b1220;
            border: 1px solid #334155;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #334155; }
        .modal-title { display: flex; align-items: center; gap: 8px; }
        .modal-title h2 { margin: 0; font-size: 14px; color: #93c5fd; }
        .modal-icon { font-size: 16px; }
        .modal-stats { font-size: 11px; color: #94a3b8; }
        .modal-close { background: transparent; color: #94a3b8; border: 0; font-size: 24px; cursor: pointer; }
        .modal-toolbar { display: flex; gap: 8px; align-items: center; padding: 8px 12px; border-bottom: 1px solid #334155; }
        .search-input { flex: 1; }
        .toolbar-actions { display: flex; gap: 6px; }
        .toolbar-btn { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 6px 8px; cursor: pointer; font-size: 11px; }
        .toolbar-btn.active { border-color: #3b82f6; color: #93c5fd; }
        .modal-tree { flex: 1; min-height: 0; overflow: auto; padding: 10px 12px; }

        @media (max-width: 1100px) {
            .main { grid-template-columns: 1fr; }
            .left { max-height: 48vh; }
        }
    </style>
</head>
<body>
<div class="page">
    <header class="header">
        <div class="title">
            <h1>LXB Command Studio</h1>
            <p>LXB-Link protocol command debugger</p>
        </div>
        <div id="connection-status" class="status-pill">未连接</div>
    </header>

    <div class="main">
        <aside class="panel left">
            <div class="left-scroll">
                <div class="card connection-card">
                    <h3>设备连接</h3>
                    <div class="row">
                        <input type="text" id="host" value="192.168.1.100" placeholder="Android WiFi IP">
                        <input type="number" id="port" value="12345" placeholder="端口" style="max-width: 120px;">
                    </div>
                    <div class="row">
                        <button id="btn-connect" class="btn btn-primary">连接</button>
                        <button id="btn-disconnect" class="btn btn-secondary" disabled>断开</button>
                    </div>
                </div>

                <div class="card">
                    <h3>Link Layer</h3>
                    <div class="row">
                        <button class="btn btn-cmd" data-cmd="handshake">HANDSHAKE</button>
                        <button class="btn btn-cmd" data-cmd="heartbeat">HEARTBEAT</button>
                    </div>
                </div>

                <div class="card">
                    <h3>Input Layer</h3>
                    <div class="row">
                        <input type="number" id="tap-x" value="500" placeholder="X">
                        <input type="number" id="tap-y" value="800" placeholder="Y">
                        <button class="btn btn-cmd" data-cmd="tap">TAP</button>
                    </div>
                    <div class="grid3" style="margin-top:8px;">
                        <input type="number" id="swipe-x1" value="500" placeholder="X1">
                        <input type="number" id="swipe-y1" value="1000" placeholder="Y1">
                        <input type="number" id="swipe-x2" value="500" placeholder="X2">
                        <input type="number" id="swipe-y2" value="500" placeholder="Y2">
                        <input type="number" id="swipe-duration" value="300" placeholder="ms">
                        <button class="btn btn-cmd" data-cmd="swipe">SWIPE</button>
                    </div>
                    <div class="row" style="margin-top:8px;">
                        <input type="number" id="longpress-x" value="500" placeholder="X">
                        <input type="number" id="longpress-y" value="800" placeholder="Y">
                        <input type="number" id="longpress-duration" value="1000" placeholder="ms">
                        <button class="btn btn-cmd" data-cmd="long_press">LONG</button>
                    </div>
                    <div class="row" style="margin-top:8px;">
                        <button class="btn btn-cmd" data-cmd="unlock">UNLOCK</button>
                    </div>
                </div>

                <div class="card">
                    <h3>Input Extension</h3>
                    <div class="row">
                        <input type="text" id="input-text" value="Hello LXB" placeholder="输入文本">
                        <button class="btn btn-cmd" data-cmd="input_text">INPUT_TEXT</button>
                    </div>
                    <div class="grid3" style="margin-top:8px;">
                        <button class="btn btn-cmd btn-small" data-cmd="key_home">HOME</button>
                        <button class="btn btn-cmd btn-small" data-cmd="key_back">BACK</button>
                        <button class="btn btn-cmd btn-small" data-cmd="key_enter">ENTER</button>
                        <button class="btn btn-cmd btn-small" data-cmd="key_menu">MENU</button>
                        <button class="btn btn-cmd btn-small" data-cmd="key_recent">RECENT</button>
                    </div>
                </div>

                <div class="card">
                    <h3>Sense Layer</h3>
                    <div class="grid2">
                        <button class="btn btn-cmd" data-cmd="get_activity">GET_ACTIVITY</button>
                        <button class="btn btn-cmd" data-cmd="get_screen_state">GET_SCREEN_STATE</button>
                        <button class="btn btn-cmd" data-cmd="get_screen_size">GET_SCREEN_SIZE</button>
                        <button class="btn btn-cmd btn-highlight" data-cmd="dump_hierarchy">DUMP_HIERARCHY</button>
                        <button class="btn btn-cmd btn-highlight" data-cmd="dump_actions">DUMP_ACTIONS</button>
                    </div>
                    <div class="row" style="margin-top:8px;">
                        <input type="text" id="find-query" placeholder="查找文本/ID">
                        <button class="btn btn-cmd" data-cmd="find_node">FIND_NODE</button>
                    </div>
                </div>

                <div class="card">
                    <h3>Lifecycle Layer</h3>
                    <div class="row">
                        <input type="text" id="app-package" placeholder="com.example.app">
                    </div>
                    <div class="row" style="margin-top:8px;">
                        <button class="btn btn-cmd" data-cmd="launch_app">LAUNCH_APP</button>
                        <button class="btn btn-cmd btn-danger" data-cmd="stop_app">STOP_APP</button>
                    </div>
                    <div class="row" style="margin-top:8px;">
                        <select id="app-filter" style="max-width: 130px;">
                            <option value="user">用户应用</option>
                            <option value="system">系统应用</option>
                            <option value="all">全部</option>
                        </select>
                        <button class="btn btn-cmd btn-highlight" data-cmd="list_apps">LIST_APPS</button>
                    </div>
                </div>

                <div class="card" style="margin-bottom:0;">
                    <h3>Media Layer</h3>
                    <button class="btn btn-cmd btn-highlight" data-cmd="screenshot">SCREENSHOT</button>
                </div>
            </div>
        </aside>

        <section class="panel right">
            <div class="log-header">
                <h2>执行日志</h2>
                <button id="btn-clear-log" class="btn btn-secondary btn-small">清空</button>
            </div>
            <div id="log-container" class="log-container mono">
                <div>控制台已启动，请连接设备...</div>
            </div>

            <div id="screenshot-preview" class="screenshot-preview" style="display: none;">
                <div class="screenshot-header">
                    <h3>截图预览</h3>
                    <button id="btn-close-preview" class="btn btn-secondary btn-small">关闭</button>
                </div>
                <img id="screenshot-image" src="" alt="Screenshot">
            </div>
        </section>
    </div>

    <div id="hierarchy-modal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title">
                    <span class="modal-icon">🌳</span>
                    <h2>UI 层级结构</h2>
                </div>
                <div class="modal-stats" id="hierarchy-stats"></div>
                <button id="btn-close-hierarchy" class="modal-close">&times;</button>
            </div>
            <div class="modal-toolbar">
                <input type="text" id="hierarchy-search" class="search-input" placeholder="搜索节点 (类名/文本/ID)">
                <div class="toolbar-actions">
                    <button id="btn-view-tree" class="toolbar-btn active">🌳 树形</button>
                    <button id="btn-view-flat" class="toolbar-btn">📋 扁平</button>
                    <button id="btn-expand-all" class="toolbar-btn">▼ 展开</button>
                    <button id="btn-collapse-all" class="toolbar-btn">▶ 折叠</button>
                </div>
            </div>
            <div id="hierarchy-tree" class="modal-tree"></div>
        </div>
    </div>

    <div id="apps-modal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title">
                    <span class="modal-icon">📱</span>
                    <h2>已安装应用</h2>
                </div>
                <div class="modal-stats" id="apps-stats"></div>
                <button id="btn-close-apps" class="modal-close">&times;</button>
            </div>
            <div class="modal-toolbar">
                <input type="text" id="apps-search" class="search-input" placeholder="搜索应用包名...">
            </div>
            <div id="apps-list" class="modal-tree apps-list"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="stats">
            <span>已发送: <strong id="stats-sent">0</strong></span>
            <span>成功: <strong id="stats-success">0</strong></span>
            <span>失败: <strong id="stats-failed">0</strong></span>
        </div>
        <div>LXB-Link v1.0</div>
    </footer>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
