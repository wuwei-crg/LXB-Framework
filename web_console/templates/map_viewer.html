<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LXB Map Viewer</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            font-family: "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100%;
            overflow: hidden;
        }

        .header {
            background: #111827;
            padding: 15px 30px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .header { display: none; }
        .header h1 {
            font-size: 20px;
            color: #93c5fd;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }

        /* 左侧面板 */
        .left-panel {
            background: #0f172a;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 16px;
        }

        .card {
            background: #111827;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #334155;
        }
        .card h3 {
            font-size: 13px;
            color: #93c5fd;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card h3::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, #3b82f6, #1d4ed8);
            border-radius: 2px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #2563eb;
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
        }
        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }

        /* 统计信息 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .stat-item {
            background: #0b1220;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #93c5fd;
        }
        .stat-label {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        /* 页面列表 */
        .page-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .page-item {
            padding: 10px 12px;
            background: #0b1220;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .page-item:hover {
            background: #172554;
        }
        .page-item.selected {
            background: #1e293b;
            border-left: 3px solid #3b82f6;
        }
        .page-item-id {
            font-size: 12px;
            font-weight: 600;
            color: #93c5fd;
        }
        .page-item-name {
            font-size: 11px;
            color: #aaa;
            margin-top: 2px;
        }
        .page-item-desc {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }

        /* 跳转列表 */
        .transition-list {
            max-height: 250px;
            overflow-y: auto;
        }
        .transition-item {
            padding: 8px 10px;
            background: #0f0f1a;
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 11px;
        }
        .transition-arrow {
            color: #7b68ee;
            margin: 0 6px;
        }
        .transition-action {
            color: #888;
            font-size: 10px;
            margin-top: 4px;
        }

        /* 弹窗/Block 列表 */
        .popup-list, .block-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .popup-item, .block-item {
            padding: 10px 12px;
            background: #0f0f1a;
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 3px solid;
        }
        .popup-item {
            border-left-color: #f5a623;
        }
        .block-item {
            border-left-color: #f55;
        }
        .popup-type, .block-type {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 4px;
        }
        .popup-type {
            background: rgba(245, 166, 35, 0.2);
            color: #f5a623;
        }
        .block-type {
            background: rgba(255, 85, 85, 0.2);
            color: #f55;
        }
        .popup-desc, .block-desc {
            font-size: 12px;
            color: #eee;
            margin-bottom: 4px;
        }
        .popup-meta, .block-meta {
            font-size: 10px;
            color: #666;
        }
        .locator-info {
            font-size: 10px;
            color: #888;
            background: #1a1a2e;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 6px;
            font-family: monospace;
        }

        /* 右侧图形区域 */
        .graph-panel {
            background: #0a0a14;
            position: relative;
            overflow: hidden;
        }
        #graph-container {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }

        /* 详情面板 */
        .detail-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 300px;
            background: rgba(30, 30, 56, 0.95);
            border-radius: 10px;
            padding: 16px;
            border: 1px solid #3a3a5a;
            display: none;
        }
        .detail-panel.show {
            display: block;
        }
        .detail-title {
            font-size: 14px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 12px;
        }
        .detail-section {
            margin-bottom: 12px;
        }
        .detail-label {
            font-size: 10px;
            color: #888;
            margin-bottom: 4px;
        }
        .detail-value {
            font-size: 12px;
            color: #eee;
        }
        .detail-features {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .feature-tag {
            padding: 2px 8px;
            background: #2a2a4a;
            border-radius: 4px;
            font-size: 10px;
            color: #aaa;
        }
        .detail-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 16px;
        }

        /* 工具栏 */
        .toolbar {
            position: absolute;
            bottom: 16px;
            left: 16px;
            display: flex;
            gap: 8px;
        }
        .toolbar button {
            padding: 8px 12px;
            background: rgba(30, 30, 56, 0.9);
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            color: #eee;
            cursor: pointer;
            font-size: 12px;
        }
        .toolbar button:hover {
            background: rgba(42, 42, 74, 0.9);
        }

        /* 文件上传 */
        .file-upload {
            border: 2px dashed #3a3a5a;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .file-upload:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }
        .file-upload input {
            display: none;
        }
        .file-upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .file-upload-text {
            font-size: 12px;
            color: #888;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }

        /* Map 列表 */
        .map-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .map-item {
            padding: 10px 12px;
            background: #0f0f1a;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .map-item:hover {
            background: #1a1a3e;
        }
        .map-item-pkg {
            font-size: 12px;
            font-weight: 600;
            color: #00d4ff;
        }
        .map-item-file {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }
        .map-item-meta {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>LXB Map Viewer</h1>
        <div style="display: flex; gap: 12px; align-items: center;">
            <span id="package-name" style="color: #94a3b8; font-size: 12px;">未加载</span>
        </div>
    </div>

    <div class="main-layout">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <!-- 文件上传 -->
            <div class="card">
                <h3>📂 加载 Map</h3>
                <div class="file-upload" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" accept=".json" onchange="loadMapFile(event)">
                    <div class="file-upload-icon">📄</div>
                    <div class="file-upload-text">点击选择 JSON 文件<br>或拖拽到此处</div>
                </div>
                <div style="margin-top: 10px; display: flex; gap: 8px;">
                    <button class="btn btn-secondary" style="flex: 1;" onclick="loadFromServer()">加载最新</button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="showMapList()">浏览列表</button>
                </div>
                <div style="margin-top: 8px;">
                    <button class="btn btn-secondary" style="width: 100%; font-size: 11px; padding: 6px;" onclick="loadDemoData()">加载示例数据</button>
                </div>
            </div>

            <!-- 已保存的 Map 列表 -->
            <div class="card" id="map-list-card" style="display: none;">
                <h3>📁 已保存的 Map</h3>
                <div class="map-list" id="map-list"></div>
            </div>

            <!-- 统计信息 -->
            <div class="card" id="stats-card" style="display: none;">
                <h3>📊 统计</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-pages">0</div>
                        <div class="stat-label">页面</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-transitions">0</div>
                        <div class="stat-label">跳转</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-popups" style="color: #f5a623;">0</div>
                        <div class="stat-label">弹窗</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-blocks" style="color: #f55;">0</div>
                        <div class="stat-label">异常页</div>
                    </div>
                </div>
            </div>

            <!-- 页面列表 -->
            <div class="card" id="pages-card" style="display: none;">
                <h3>📑 页面列表</h3>
                <div class="page-list" id="page-list"></div>
            </div>

            <!-- 跳转列表 -->
            <div class="card" id="transitions-card" style="display: none;">
                <h3>🔗 跳转关系</h3>
                <div class="transition-list" id="transition-list"></div>
            </div>

            <!-- 弹窗列表 -->
            <div class="card" id="popups-card" style="display: none;">
                <h3>🚫 弹窗/广告</h3>
                <div class="popup-list" id="popup-list"></div>
            </div>

            <!-- 异常页面列表 -->
            <div class="card" id="blocks-card" style="display: none;">
                <h3>⚠️ 异常页面</h3>
                <div class="block-list" id="block-list"></div>
            </div>
        </div>

        <!-- 右侧图形区域 -->
        <div class="graph-panel">
            <div id="graph-container"></div>

            <!-- 详情面板 -->
            <div class="detail-panel" id="detail-panel">
                <button class="detail-close" onclick="hideDetail()">×</button>
                <div class="detail-title" id="detail-title">页面详情</div>
                <div class="detail-section">
                    <div class="detail-label">页面ID</div>
                    <div class="detail-value" id="detail-id">-</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">描述</div>
                    <div class="detail-value" id="detail-desc">-</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">功能</div>
                    <div class="detail-features" id="detail-features"></div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">出边 (可跳转到)</div>
                    <div class="detail-value" id="detail-outgoing">-</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">入边 (可从哪来)</div>
                    <div class="detail-value" id="detail-incoming">-</div>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="toolbar">
                <button onclick="fitGraph()">适应窗口</button>
            </div>
        </div>
    </div>

    <script>
        // 检查 vis 库是否加载
        if (typeof vis === 'undefined') {
            console.error('vis-network 库未加载');
            document.body.innerHTML = '<div style="padding: 50px; color: #f66; text-align: center;">vis-network 库加载失败，请检查网络连接</div>';
        }

        let mapData = null;
        let network = null;

        // 加载示例数据
        function loadDemoData() {
            mapData = {
                package: "com.example.demo",
                pages: {
                    "home": { name: "首页", description: "浏览推荐内容", features: ["下拉刷新", "内容卡片"] },
                    "search": { name: "搜索", description: "搜索内容", features: ["搜索框", "历史记录"] },
                    "profile": { name: "我的", description: "个人中心", features: ["头像", "设置入口"] },
                    "settings": { name: "设置", description: "应用设置", features: ["账号", "通知", "隐私"] },
                    "detail": { name: "详情", description: "内容详情页", features: ["评论", "分享"] }
                },
                transitions: [
                    { from: "home", to: "search", description: "点击搜索", action: { type: "tap", locator: { resource_id: "btn_search", text: "搜索" } } },
                    { from: "home", to: "profile", description: "点击我的", action: { type: "tap", locator: { resource_id: "tab_profile", text: "我的" } } },
                    { from: "home", to: "detail", description: "点击内容", action: { type: "tap", locator: { text: "推荐内容", bounds_hint: [50, 400, 1030, 600] } } },
                    { from: "profile", to: "settings", description: "点击设置", action: { type: "tap", locator: { resource_id: "btn_settings", content_desc: "设置" } } },
                    { from: "profile", to: "home", description: "点击首页", action: { type: "tap", locator: { resource_id: "tab_home", text: "首页" } } },
                    { from: "search", to: "home", description: "点击首页", action: { type: "tap", locator: { resource_id: "tab_home", text: "首页" } } },
                    { from: "search", to: "detail", description: "点击搜索结果", action: { type: "tap", locator: { text: "搜索结果项", parent_rid: "search_list" } } },
                    { from: "settings", to: "profile", description: "点击返回", action: { type: "tap", locator: { content_desc: "返回" } } }
                ],
                popups: [
                    {
                        id: "popup_980_120",
                        type: "splash_ad",
                        description: "开屏广告-跳过按钮",
                        close_locator: { resource_id: "skip_btn", text: "跳过" },
                        first_seen_page: "home"
                    },
                    {
                        id: "popup_540_1200",
                        type: "update",
                        description: "更新提示-以后再说按钮",
                        close_locator: { text: "以后再说" },
                        first_seen_page: "home"
                    }
                ],
                blocks: [
                    {
                        type: "captcha",
                        description: "滑块验证-向右滑动完成验证",
                        activity: "com.example.demo/.CaptchaActivity",
                        identifiers: ["slider_view", "captcha_image", "verify_btn"],
                        trigger_node: "搜索",
                        hit_count: 2
                    }
                ]
            };
            renderMap();
        }

        // 加载本地文件
        function loadMapFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    mapData = JSON.parse(e.target.result);
                    renderMap();
                } catch (err) {
                    alert('JSON 解析失败: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        // 从服务器加载
        async function loadFromServer() {
            try {
                const res = await fetch('/api/maps/latest');
                const data = await res.json();
                if (data.success && data.data) {
                    mapData = data.data;
                    renderMap();
                } else {
                    alert(data.message || '没有可用的 Map');
                }
            } catch (e) {
                alert('加载失败: ' + e.message);
            }
        }

        // 显示 Map 列表
        async function showMapList() {
            try {
                const res = await fetch('/api/maps/list');
                const data = await res.json();
                if (data.success) {
                    renderMapList(data.data);
                    document.getElementById('map-list-card').style.display = 'block';
                } else {
                    alert(data.message || '获取列表失败');
                }
            } catch (e) {
                alert('获取列表失败: ' + e.message);
            }
        }

        // 渲染 Map 列表
        function renderMapList(maps) {
            const container = document.getElementById('map-list');
            container.innerHTML = '';

            if (maps.length === 0) {
                container.innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">暂无保存的 Map</div>';
                return;
            }

            for (const map of maps) {
                const item = document.createElement('div');
                item.className = 'map-item';
                item.innerHTML = `
                    <div class="map-item-pkg">${map.package}</div>
                    <div class="map-item-file">${map.filename}</div>
                    <div class="map-item-meta">
                        <span>${(map.size / 1024).toFixed(1)} KB</span>
                        <span>${map.modified}</span>
                    </div>
                `;
                item.onclick = () => loadMapFromPath(map.filepath);
                container.appendChild(item);
            }
        }

        // 从路径加载 Map
        async function loadMapFromPath(filepath) {
            try {
                const res = await fetch('/api/maps/load', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filepath })
                });
                const data = await res.json();
                if (data.success && data.data) {
                    mapData = data.data;
                    renderMap();
                    document.getElementById('map-list-card').style.display = 'none';
                } else {
                    alert(data.message || '加载失败');
                }
            } catch (e) {
                alert('加载失败: ' + e.message);
            }
        }

        // 渲染地图
        function renderMap() {
            if (!mapData) return;

            // 更新包名
            document.getElementById('package-name').textContent = mapData.package || '未知应用';

            // 显示卡片
            document.getElementById('stats-card').style.display = 'block';
            document.getElementById('pages-card').style.display = 'block';
            document.getElementById('transitions-card').style.display = 'block';

            // 统计
            const pages = mapData.pages || {};
            const transitions = mapData.transitions || [];
            const popups = mapData.popups || [];
            const blocks = mapData.blocks || [];

            document.getElementById('stat-pages').textContent = Object.keys(pages).length;
            document.getElementById('stat-transitions').textContent = transitions.length;
            document.getElementById('stat-popups').textContent = popups.length;
            document.getElementById('stat-blocks').textContent = blocks.length;

            // 页面列表
            renderPageList(pages);

            // 跳转列表
            renderTransitionList(transitions);

            // 弹窗列表
            if (popups.length > 0) {
                document.getElementById('popups-card').style.display = 'block';
                renderPopupList(popups);
            } else {
                document.getElementById('popups-card').style.display = 'none';
            }

            // 异常页面列表
            if (blocks.length > 0) {
                document.getElementById('blocks-card').style.display = 'block';
                renderBlockList(blocks);
            } else {
                document.getElementById('blocks-card').style.display = 'none';
            }

            // 绘制图形
            renderGraph(pages, transitions);
        }

        // 渲染页面列表
        function renderPageList(pages) {
            const container = document.getElementById('page-list');
            container.innerHTML = '';

            for (const [pageId, page] of Object.entries(pages)) {
                const item = document.createElement('div');
                item.className = 'page-item';
                item.innerHTML = `
                    <div class="page-item-id">${pageId}</div>
                    <div class="page-item-name">${page.name || '-'}</div>
                    <div class="page-item-desc">${page.description || '-'}</div>
                `;
                item.onclick = () => {
                    document.querySelectorAll('.page-item').forEach(el => el.classList.remove('selected'));
                    item.classList.add('selected');
                    showPageDetail(pageId, page);
                    if (network) {
                        network.selectNodes([pageId]);
                        network.focus(pageId, { scale: 1.5, animation: true });
                    }
                };
                container.appendChild(item);
            }
        }

        // 格式化 locator 为可读字符串
        function formatLocator(locator) {
            if (!locator) return '';
            const parts = [];
            if (locator.resource_id) parts.push(`rid: ${locator.resource_id}`);
            if (locator.text) parts.push(`text: "${locator.text}"`);
            if (locator.content_desc) parts.push(`desc: "${locator.content_desc}"`);
            if (locator['class']) parts.push(`class: ${locator['class']}`);
            if (locator.parent_rid) parts.push(`parent: ${locator.parent_rid}`);
            if (locator.bounds_hint) {
                const b = locator.bounds_hint;
                parts.push(`bounds: [${b.join(',')}]`);
            }
            return parts.join(' | ');
        }

        // 渲染跳转列表
        function renderTransitionList(transitions) {
            const container = document.getElementById('transition-list');
            container.innerHTML = '';

            for (const trans of transitions) {
                const item = document.createElement('div');
                item.className = 'transition-item';
                const locator = trans.action ? trans.action.locator : null;
                const locatorStr = formatLocator(locator);
                item.innerHTML = `
                    <span style="color: #00d4ff;">${trans.from}</span>
                    <span class="transition-arrow">→</span>
                    <span style="color: #7b68ee;">${trans.to}</span>
                    <div class="transition-action">${trans.description || ''}</div>
                    ${locatorStr ? `<div class="locator-info">${locatorStr}</div>` : ''}
                `;
                item.onclick = () => {
                    if (network) {
                        network.selectNodes([trans.from, trans.to]);
                    }
                };
                container.appendChild(item);
            }
        }

        // 弹窗类型映射
        const popupTypeLabels = {
            'splash_ad': '开屏广告',
            'update': '更新提示',
            'teen_mode': '青少年模式',
            'permission': '权限请求',
            'rating': '评价提示',
            'dialog': '弹窗对话框'
        };

        // 渲染弹窗列表
        function renderPopupList(popups) {
            const container = document.getElementById('popup-list');
            container.innerHTML = '';

            for (const popup of popups) {
                const item = document.createElement('div');
                item.className = 'popup-item';

                const typeLabel = popupTypeLabels[popup.type] || popup.type;
                const locator = popup.close_locator || {};
                const locatorStr = Object.entries(locator)
                    .filter(([k, v]) => v)
                    .map(([k, v]) => `${k}: ${v}`)
                    .join(', ');

                item.innerHTML = `
                    <span class="popup-type">${typeLabel}</span>
                    <div class="popup-desc">${popup.description || '-'}</div>
                    <div class="popup-meta">
                        首次出现: ${popup.first_seen_page || '-'}
                        ${popup.hit_count ? ` · 命中 ${popup.hit_count} 次` : ''}
                    </div>
                    ${locatorStr ? `<div class="locator-info">${locatorStr}</div>` : ''}
                `;
                container.appendChild(item);
            }
        }

        // Block 类型映射
        const blockTypeLabels = {
            'captcha': '人机验证',
            'risk_control': '风控拦截',
            'login_required': '强制登录',
            'network_error': '网络错误',
            'crash': '应用崩溃'
        };

        // 渲染异常页面列表
        function renderBlockList(blocks) {
            const container = document.getElementById('block-list');
            container.innerHTML = '';

            for (const block of blocks) {
                const item = document.createElement('div');
                item.className = 'block-item';

                const typeLabel = blockTypeLabels[block.type] || block.type;
                const identifiers = block.identifiers || [];

                item.innerHTML = `
                    <span class="block-type">${typeLabel}</span>
                    <div class="block-desc">${block.description || '-'}</div>
                    <div class="block-meta">
                        触发节点: ${block.trigger_node || '-'}
                        ${block.hit_count ? ` · 命中 ${block.hit_count} 次` : ''}
                    </div>
                    ${block.activity ? `<div class="locator-info">Activity: ${block.activity}</div>` : ''}
                    ${identifiers.length > 0 ? `<div class="locator-info">IDs: ${identifiers.slice(0, 5).join(', ')}${identifiers.length > 5 ? '...' : ''}</div>` : ''}
                `;
                container.appendChild(item);
            }
        }

        // 绘制图形
        function renderGraph(pages, transitions) {
            const container = document.getElementById('graph-container');

            // 销毁旧实例
            if (network) {
                network.destroy();
                network = null;
            }

            const pageIds = Object.keys(pages);
            console.log('渲染图形:', pageIds.length, '个页面,', transitions.length, '个跳转');

            if (pageIds.length === 0) {
                container.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #666;">没有页面数据</div>';
                return;
            }

            container.innerHTML = '';

            // 节点
            const nodes = [];
            for (const [pageId, page] of Object.entries(pages)) {
                nodes.push({
                    id: pageId,
                    label: `${page.name || pageId}`,
                    title: page.description || ''
                });
            }

            // 边 - 显示描述标签，tooltip 显示 locator
            const edges = [];
            for (let i = 0; i < transitions.length; i++) {
                const trans = transitions[i];
                const locator = trans.action ? trans.action.locator : null;
                const locatorStr = formatLocator(locator);
                const desc = trans.description || '';
                edges.push({
                    id: `e${i}`,
                    from: trans.from,
                    to: trans.to,
                    label: desc,
                    title: locatorStr ? `${desc}\n${locatorStr}` : desc
                });
            }

            // 简洁的树形配置
            const options = {
                nodes: {
                    shape: 'box',
                    color: {
                        background: '#1e1e38',
                        border: '#00d4ff',
                        highlight: { background: '#2a2a5a', border: '#00d4ff' }
                    },
                    font: { color: '#fff', size: 14 },
                    borderWidth: 2,
                    margin: 10
                },
                edges: {
                    arrows: 'to',
                    color: { color: '#666', highlight: '#00d4ff' },
                    font: { color: '#aaa', size: 10, strokeWidth: 0, align: 'top' },
                    smooth: false,
                    width: 1
                },
                layout: {
                    hierarchical: {
                        enabled: true,
                        direction: 'LR',        // 从左到右
                        sortMethod: 'directed',
                        levelSeparation: 180,
                        nodeSpacing: 80
                    }
                },
                physics: false,
                interaction: {
                    dragNodes: true,
                    zoomView: true,
                    dragView: true
                }
            };

            try {
                const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
                network = new vis.Network(container, data, options);

                network.once('afterDrawing', () => {
                    network.fit({ animation: false });
                });
            } catch (e) {
                console.error('渲染失败:', e);
                container.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #f66;">渲染失败: ${e.message}</div>`;
                return;
            }

            // 点击事件
            network.on('click', (params) => {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    const page = pages[nodeId];
                    if (page) {
                        showPageDetail(nodeId, page);
                    }
                } else {
                    hideDetail();
                }
            });
        }

        // 显示页面详情
        function showPageDetail(pageId, page) {
            const panel = document.getElementById('detail-panel');
            panel.classList.add('show');

            document.getElementById('detail-title').textContent = page.name || pageId;
            document.getElementById('detail-id').textContent = pageId;
            document.getElementById('detail-desc').textContent = page.description || '-';

            // 功能标签
            const featuresContainer = document.getElementById('detail-features');
            featuresContainer.innerHTML = '';
            const features = page.features || [];
            if (features.length > 0) {
                features.forEach(f => {
                    const tag = document.createElement('span');
                    tag.className = 'feature-tag';
                    tag.textContent = f;
                    featuresContainer.appendChild(tag);
                });
            } else {
                featuresContainer.innerHTML = '<span style="color: #666;">无</span>';
            }

            // 出边入边（含 locator）
            const transitions = mapData.transitions || [];
            const outgoing = transitions.filter(t => t.from === pageId);
            const incoming = transitions.filter(t => t.to === pageId);

            const outEl = document.getElementById('detail-outgoing');
            if (outgoing.length > 0) {
                outEl.innerHTML = outgoing.map(t => {
                    const loc = t.action ? t.action.locator : null;
                    const locStr = formatLocator(loc);
                    return `<div style="margin-bottom:6px;">
                        <span style="color:#7b68ee;">${t.to}</span>
                        <span style="color:#666;font-size:10px;margin-left:4px;">${t.description || ''}</span>
                        ${locStr ? `<div class="locator-info" style="margin-top:3px;">${locStr}</div>` : ''}
                    </div>`;
                }).join('');
            } else {
                outEl.textContent = '无';
            }

            const inEl = document.getElementById('detail-incoming');
            if (incoming.length > 0) {
                inEl.innerHTML = incoming.map(t => {
                    const loc = t.action ? t.action.locator : null;
                    const locStr = formatLocator(loc);
                    return `<div style="margin-bottom:6px;">
                        <span style="color:#00d4ff;">${t.from}</span>
                        <span style="color:#666;font-size:10px;margin-left:4px;">${t.description || ''}</span>
                        ${locStr ? `<div class="locator-info" style="margin-top:3px;">${locStr}</div>` : ''}
                    </div>`;
                }).join('');
            } else {
                inEl.textContent = '无';
            }
        }

        function hideDetail() {
            document.getElementById('detail-panel').classList.remove('show');
        }

        function fitGraph() {
            if (network) {
                network.fit({ animation: true });
            }
        }

        // 拖拽上传
        const uploadArea = document.querySelector('.file-upload');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#00d4ff';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#3a3a5a';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#3a3a5a';
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.json')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        mapData = JSON.parse(ev.target.result);
                        renderMap();
                    } catch (err) {
                        alert('JSON 解析失败: ' + err.message);
                    }
                };
                reader.readAsText(file);
            }
        });
    </script>
</body>
</html>
